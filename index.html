<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        const { useState } = React;  //al posto di importare useState come facevamo, lo destrutturiamo dalla variabile React importata tramite CDN

        const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

        const ReactApp = () => {

            const [animals, setAnimals] = useState([])

            const addAnimal = () => {
                const random_number = Math.floor(Math.random() * animalsChoices.length);
                setAnimals(animals => [...animals, animalsChoices[random_number]]);
            }

            return (
                <>
                    <button onClick={addAnimal}>Aggiungi Animale</button>
                    <details>
                        <summary>animali</summary>
                        <ul>
                            {animals.map((animal, i) => (
                                <li key={i}>{animal}</li>
                            ))}
                        </ul>
                    </details>
                </>
            )
        } 
    </script> <!-- questa è la creazione del componente React -->

    <script type="text/babel">
        const { createRoot } = ReactDOM;

        const listaAnimali = document.querySelector('.lista-animali');
        const root = createRoot(listaAnimali);
        root.render(<ReactApp />)
    </script> <!-- questo è il montaggio nel DOM -->

</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <div class="lista-animali">

        </div>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
